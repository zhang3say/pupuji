services:
  server:
    build: ./server
    ports:
      - "8010:8010"
    env_file:
      - ./server/.env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pupuji
      POSTGRES_PASSWORD: pupuji_dev
      POSTGRES_DB: pupuji
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pupuji"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
